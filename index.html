<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 元宵猜謎大挑戰</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DEJNETQZ2S"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-DEJNETQZ2S');

      // 自定義統計：發送遊戲開始事件
      function trackGameStart() {
        gtag('event', 'game_start', {
          'event_category': 'quiz',
          'event_label': 'lantern_challenge'
        });
      }
    </script>

    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background: #fdfcf0; 
            padding: 10px;
            user-select: none;
        }
        #game-container { 
            background: white; padding: 1.5rem; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            width: 100%; max-width: 550px; text-align: center; 
            border: 4px solid #f39c12; 
        }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .timer { font-size: 1.8rem; color: #e74c3c; font-weight: bold; }
        .counter { font-size: 1.2rem; color: #7f8c8d; font-weight: bold; background: #eee; padding: 5px 15px; border-radius: 20px; }
        
        .question { 
            font-size: 1.4rem; font-weight: bold; color: #2c3e50; 
            margin-bottom: 1.5rem; min-height: 4em; 
            display: flex; align-items: center; justify-content: center; line-height: 1.5; 
        }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        @media (max-width: 480px) {
            .options { grid-template-columns: 1fr; }
            button { padding: 16px 10px !important; font-size: 1.1rem !important; }
            .timer { font-size: 1.5rem; }
        }

        button { 
            padding: 18px 10px; font-size: 1.1rem; cursor: pointer; 
            border: 2px solid #f39c12; background: white; color: #d35400; 
            border-radius: 12px; font-weight: bold; outline: none;
            transition: background 0.1s;
        }
        
        button.correct { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        button.wrong { background-color: #e74c3c !important; color: white !important; border-color: #c0392b !important; }
        
        @media (min-width: 1025px) {
            button:hover:not(:disabled) { background: #f39c12; color: white; }
        }

        .start-btn { 
            background: #e67e22; color: white; border: none; 
            padding: 15px 40px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; 
        }
        .hidden { display: none; }
        #score-board { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1>🏮 燈你來挑戰 🏮</h1>
        <p>限時 45 秒，上限 20 題</p>
        <button class="start-btn" onclick="startGame()">開始遊戲 GO!</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="status-bar">
            <div class="timer">⏳ <span id="time">45</span>s</div>
            <div class="counter">第 <span id="current-count">1</span> / 20 題</div>
        </div>
        <div id="question-text" class="question">載入中...</div>
        <div id="options-container" class="options"></div>
    </div>

    <div id="score-board">
        <h1 id="end-title">⏱️ 時間到！</h1>
        <p style="font-size: 1.5rem;">最終答對題數：<span id="final-score" style="color:#e67e22; font-size: 3rem;">0</span></p>
        <button class="start-btn" onclick="location.reload()">再挑戰一次</button>
    </div>
</div>

<script>
    // --- 題目題庫區 (請在此貼入你完整的 50 題) ---
    const questions = [
        { "question": "金金金金金（猜一明星）", "options": ["金城武","金秀賢","明金城","金士傑"], "answer": "金城武" },
        { "question": "電視機聲音關小聲點（猜一神明）", "options": ["觀世音","玉皇大帝","關公","文昌帝君"], "answer": "觀世音" },
        { "question": "拿人鼻子當馬騎（猜一物品）", "options": ["眼鏡","口罩","眉筆","髮圈"], "answer": "眼鏡" },
        { "question": "出入成雙，酸甜苦辣味總先嚐（猜一物品）", "options": ["筷子","湯匙","勺子","叉子"], "answer": "筷子" },
        { "question": "有硬有軟，有長有寬，白天空閒，夜晚上班（猜一物品）", "options": ["床","椅子","桌子","凳子"], "answer": "床" },
        { "question": "圓圓的身體，全身是疙瘩，有點像苦瓜（猜一水果）", "options": ["釋迦","芒果","荔枝","鳳梨"], "answer": "釋迦" },
        { "question": "神的交通工具是什麼？", "options": ["寶貝","飛機","腳踏車","摩托車"], "answer": "寶貝" },
        { "question": "什麼動物最怕濕？", "options": ["雞","豬","狗","牛"], "answer": "雞" },
        { "question": "透明的劍是什麼劍？", "options": ["看不見","聽不見","倚天劍","石中劍"], "answer": "看不見" },
        { "question": "阮經天的舅公是誰？", "options": ["軟骨功","軟腳功","阮明天","阮昨天"], "answer": "軟骨功" },
        { "question": "日月潭的中間是什麼？", "options": ["月","船","島","魚"], "answer": "月" },
        { "question": "啦啦隊不准坐下（猜地點）", "options": ["加油站","加水站","公車站","路邊站"], "answer": "加油站" },
        { "question": "偷什麼東西不犯法？", "options": ["偷笑","偷錢包","偷鞋子","偷吃霸王餐"], "answer": "偷笑" },
        { "question": "什麼水果視力最差？", "options": ["芒果","蓮霧","蘋果","棗子"], "answer": "芒果" },
        { "question": "孔子是我國最偉大的什麼家?", "options": ["老人家","運動家","藝術家","音樂家"], "answer": "老人家" },
        { "question": "甚麼運動是往後跑的？", "options": ["拔河","跳遠","標槍","鉛球"], "answer": "拔河" },
        { "question": "地層下陷(猜地名)", "options": ["深坑","卑南","崁頂","大寮"], "answer": "深坑" },
        { "question": "被蚊子咬(猜地名)", "options": ["艋舺","枋寮","暖暖","瑞穗"], "answer": "艋舺" },
        { "question": "不良少年(猜地名)", "options": ["太保","大甲","淡水","板橋"], "answer": "太保" },
        { "question": "四季如春(猜地名)", "options": ["恆春","長濱","暖暖","永康"], "answer": "恆春" },
        { "question": "失敗之子(猜地名)", "options": ["成功","大勝","歸來","卑南"], "answer": "成功" },
        { "question": "雨後春筍(猜地名)", "options": ["新竹","茂林","竹山","春日"], "answer": "新竹" },
        { "question": "射日勇將(猜地名)", "options": ["後驛","將軍","成功","陽明山"], "answer": "後驛" },
        { "question": "籠中鳥(猜三國人物)", "options": ["關羽","張飛","陸遜","趙雲"], "answer": "關羽" },
        { "question": "海陸空的海空很厲害(猜三國人物)", "options": ["陸遜","孫策","孫權","趙雲"], "answer": "陸遜" },
        { "question": "降落傘(猜三國人物)", "options": ["張飛","呂布","曹操","小喬"], "answer": "張飛" },
        { "question": "說人人到(猜三國人物)", "options": ["曹操","馬超","劉備","黃忠"], "answer": "曹操" },
        { "question": "對雲朵拍照(猜三國人物)", "options": ["趙雲","諸葛亮","張良","蔣幹"], "answer": "趙雲" },
        { "question": "歌廳秀(猜三國人物)", "options": ["諸葛亮","龐統","司馬遷","周瑜"], "answer": "諸葛亮" },
        { "question": "不占錢包空間，還能自動兌獎", "options": ["雲端發票","刮刮樂","大樂透","威力彩"], "answer": "雲端發票" },
        { "question": "聽起來在天上，但實際存在手機", "options": ["雲端發票","月亮蝦餅","猩猩","棉花糖"], "answer": "雲端發票" },
        { "question": "納稅人的靠山", "options": ["納保官","代書","梁靜茹","枕頭"], "answer": "納保官" },
        { "question": "生男生女一樣好(猜哪種平等)", "options": ["性別平等","租稅平等","消費平等","口袋平等"], "answer": "性別平等" },
        { "question": "兒子女兒都平等(猜一種權利)", "options": ["繼承權","兵役權","專利權","財產權"], "answer": "繼承權" },
        { "question": "媽媽！我被綁架了(猜一種行為)", "options": ["詐騙","睡覺","吃飯","發呆"], "answer": "詐騙" },
        { "question": "被詐騙時拯救你的3個數字", "options": ["165","113","112","118"], "answer": "165" },
        { "question": "買賣不公平，找他保護你", "options": ["消保官","納保官","書記官","外交官"], "answer": "消保官" },
        { "question": "不用兌，中了直接匯", "options": ["雲端發票","紙本發票","三聯式發票","收據"], "answer": "雲端發票" },
        { "question": "黑白相間，店員都會嗶一聲", "options": ["手機條碼","斑馬","圍棋","太極"], "answer": "手機條碼" },
        { "question": "沒到手想搶到手，搶到手卻扔出手", "options": ["籃球","羽球","桌球","棒球"], "answer": "籃球" },
        { "question": "狼來了", "options": ["楊桃","蜜桃","壽桃","哈密瓜"], "answer": "楊桃" },
        { "question": "七十二小時(猜字)", "options": ["日","朋","晶","昌"], "answer": "晶" },
        { "question": "少了一本書(猜成語)", "options": ["缺一不可","萬萬不可","不可思議","不可理喻"], "answer": "缺一不可" },
        { "question": "甚麼科系畢業後去賣壽司", "options": ["美術系","國文系","化學系","財經系"], "answer": "美術系" },
        { "question": "綠衣漢，街上站，光吃紙，不吃飯", "options": ["郵筒","電線杆","路燈","消防栓"], "answer": "郵筒" },
        { "question": "有點自大(猜一字)", "options": ["臭","昊","美","尖"], "answer": "臭" },
        { "question": "雙火雙水(猜地名)", "options": ["淡水","清水","清境","澎湖"], "answer": "淡水" },
        { "question": "男生太多(猜一字)", "options": ["妙","好","如","姑"], "answer": "妙" },
        { "question": "台灣午後是誰", "options": ["雷陣雨","陳芳語","張宇","周子瑜"], "answer": "雷陣雨" },
        { "question": "什麼國家的人都不用電的？", "options": ["緬甸","泰國","韓國","日本"], "answer": "緬甸" }
    ];

    let score = 0;
    let questionCount = 0; 
    const maxQuestions = 20; 
    const PLAY_LIMIT = 5; 
    let timeLeft = 45;
    let timerInterval;
    let availableQuestions = [];
    let isChecking = false;

    function startGame() {
        // 追蹤遊戲開始事件
        if(typeof gtag === 'function') {
            trackGameStart();
        }

        let playHistory = localStorage.getItem('lanternQuizPlayCount') || 0;
        playHistory = parseInt(playHistory);

        if (playHistory >= PLAY_LIMIT) {
            alert("哎呀！您的挑戰次數已用完囉 (上限 " + PLAY_LIMIT + " 次)。\n感謝您的參與！");
            return;
        }

        localStorage.setItem('lanternQuizPlayCount', playHistory + 1);

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        availableQuestions = [...questions];
        score = 0;
        questionCount = 0;
        timeLeft = 45;

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
            if (timeLeft <= 0) {
                document.getElementById('end-title').innerText = "⏱️ 時間到！";
                endGame();
            }
        }, 1000);

        nextQuestion();
    }

    function nextQuestion() {
        isChecking = false;
        if (questionCount >= maxQuestions) {
            document.getElementById('end-title').innerText = "🎉 恭喜完成 20 題！";
            endGame();
            return;
        }

        questionCount++;
        document.getElementById('current-count').innerText = questionCount;

        if (availableQuestions.length === 0) availableQuestions = [...questions];
        const randomIndex = Math.floor(Math.random() * availableQuestions.length);
        const currentQuestion = availableQuestions.splice(randomIndex, 1)[0];

        const container = document.getElementById('options-container');
        container.innerHTML = ''; 
        document.getElementById('question-text').innerText = currentQuestion.question;
        
        let shuffledOptions = [...currentQuestion.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => {
                document.activeElement.blur(); 
                checkResult(btn, opt, currentQuestion.answer);
            };
            container.appendChild(btn);
        });
    }

    function checkResult(selectedBtn, selectedText, correctText) {
        if (isChecking) return;
        isChecking = true;

        const allButtons = document.querySelectorAll('#options-container button');
        allButtons.forEach(btn => {
            btn.disabled = true;
            if (btn.innerText === correctText) btn.classList.add('correct');
        });

        if (selectedText === correctText) {
            score++;
        } else {
            selectedBtn.classList.add('wrong');
        }

        setTimeout(nextQuestion, 600);
    }

    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('score-board').style.display = 'block';
        document.getElementById('final-score').innerText = score;
    }
</script>

</body>
</html>
